<!DOCTYPE html>
<html>
  <head>
    <title>Mon Profil</title>
    <style>.carte {
text-align: center;
  max-width: 600px;        /* La boîte ne dépassera pas 600 pixels de large */
  margin: 50px auto;       /* 50px d'espace en haut/bas, et CENTRÉ horizontalement */
  background-color: white; /* Le fond de ta carte sera tout blanc */
  padding: 30px;           /* Du rembourrage pour que le texte ne colle pas aux bords */
  border-radius: 12px;     /* Des bords arrondis élégants */
  box-shadow: 0 4px 10px rgba(0,0,0,0.1); /* Une ombre légère pour donner du relief */
}h1 {
  color: blue;
}img {
  display: block;
  margin: 0 auto 20px auto;
  border-radius: 8px; /* Ça arrondira légèrement les coins du logo */
}
body {
  background-color: #f8fafc; /* Gris clair moderne */
  font-family: sans-serif;   /* Écriture propre */
}
button {
  background-color: #1e293b; /* Bleu nuit pro */
  color: white;              /* Texte blanc */
  padding: 12px 24px;        /* Espacement intérieur */
  border: none;              /* Supprime la bordure */
  border-radius: 8px;        /* Angles arrondis */
  margin-top: 20px;          /* Espace au-dessus */
  cursor: pointer;           /* Curseur cliquable */
} </style>
  </head>
  <body>
    <div
class="carte">
    <h1>Cheikh Ahmed Tidiane Sene</h1>
    <img src="https://via.placeholder.com/150/000000/FFFFFF/?text=CATS+3" alt="logo de l'entreprise CATS 3">
    <p>Je veux devenir codeur pour developper des logiciels, des applications et des sites web.</p>
    
    <h2>Mes objectifs.</h2>
    <ul>
      <li>CATS 3 <strong>Tech</strong></li>
      <li>CATS 3 <strong>Défense</strong></li>
      <li>CATS 3 <strong>Santé</strong></li>
    </ul>
    
    <p id="statut">Découvrez mon futur projet :</p>
    <a href="https://www.cats3.com">Visiter le site de CATS 3.</a>
    
    <button onclick="lancerprojet()">Lancer le projet</button>

    <script>
      function lancerprojet() {
        // On cible l'id "statut" et on change son texte
        document.getElementById("statut").textContent = "Le projet CATS 3 est en cours de déploiement...";
      }
    </script>
    </div>
  </body>
</html>
